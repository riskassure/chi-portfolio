<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Mathematics Library - Chi-Chih Woo</title>

    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="math.css">
</head>

<body style="font-family: system-ui, sans-serif; background-color: #f8fafc; margin: 0;">

    <div style="max-width: 1100px; margin: 2.5rem auto; padding: 0 1.5rem;">

        <div style="margin-bottom: 1rem;">
            <a href="index.html" style="color: #2563eb; text-decoration: none; font-weight: 500; display: inline-flex; align-items: center; gap: 0.25rem; margin-bottom: 1rem;">
                ← Back to Mathematics Library
            </a>
        </div>

        <section style="background: #ffffff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 1.5rem; box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08); margin-bottom: 1.5rem;">
            <h1 style="font-size: 2rem; color: #0f172a; margin: 0 0 0.5rem 0; font-weight: 800;">
                Search Mathematics Library
            </h1>

            <p style="color: #64748b; margin: 0 0 1.25rem 0;">
                Search across concepts, synonyms, defined terms, and MSC classifications.
            </p>

            <form id="searchPageForm" style="display: flex; gap: 0.75rem; align-items: stretch; flex-wrap: wrap;">
                <input
                    type="text"
                    id="searchPageInput"
                    class="search-box"
                    placeholder="Search for group, compactness, 20K, topology..."
                    autocomplete="off"
                    style="flex: 1 1 420px; min-width: 260px;"
                >

                <button
                    type="submit"
                    style="background: #2563eb; color: #ffffff; border: none; border-radius: 6px; padding: 0.75rem 1.25rem; font-weight: 700; cursor: pointer;"
                >
                    Search
                </button>
            </form>
        </section>

        <div
            id="searchSummary"
            style="margin-bottom: 1rem; color: #475569; font-weight: 600;"
        ></div>

        <div id="searchResultsContainer">
            <div class="msg-box">Enter a search term above.</div>
        </div>

    </div>

    <script src="../navbar.js"></script>
    <script src="math_search.js?v=1.0"></script>
</body>
</html>
