<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Catalog | Chi-Chih Woo</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="music.css">
</head>
<body>
    <main style="padding: 40px; font-family: Arial, sans-serif;">
        <h2>My Classical Music Catalog</h2>
        <p>A sortable, filterable archive of favorite pieces, genres, and modal studies.</p>

        <div style="margin-bottom: 20px; padding: 20px; background-color: #f4f6f7; border-radius: 5px; display: flex; flex-direction: column; gap: 15px;">
            <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                <strong>Controls:</strong>
                <label>Search:
                    <input type="text" id="search-bar" placeholder="Type to filter grid..." style="padding: 5px; border: 1px solid #ccc; border-radius: 3px; width: 220px;">
                </label>

                <label>Playlist:
                    <select id="filter-playlist">
                        <option value="all">All Playlists</option>
                    </select>
                </label>

                <button id="reset-filters" style="padding: 5px 10px; background-color: #e74c3c; color: white; border: none; border-radius: 3px; cursor: pointer;">Reset View</button>
            </div>

            <div id="admin-controls-dock" style="display: none; border-top: 1px solid #ddd; padding-top: 12px; align-items: center; gap: 15px;">
                <strong style="color: #2563eb;">🛠️ Edit Mode Active:</strong>
                <button id="admin-edit-btn" style="padding: 6px 14px; background-color: #3498db; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">Edit Table ✏️</button>
                <button id="admin-save-btn" style="display: none; padding: 6px 14px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">Save Changes 💾</button>
                <button id="admin-cancel-btn" style="display: none; padding: 6px 14px; background-color: #95a5a6; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">Cancel ❌</button>
            </div>

            <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap; border-top: 1px solid #ddd; padding-top: 12px; font-size: 0.9em;">
                <strong>Optional Metrics:</strong>
                <div id="column-checkboxes" style="display: flex; gap: 15px; align-items: center;"></div>
            </div>
        </div>

        <div class="table-container" style="overflow-x: auto; margin-top: 20px;">
            <table id="music-table" style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead>
                    <tr id="table-headers" style="background-color: #34495e; color: white;"></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
            <div id="pagination-controls" style="display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 20px; padding: 10px;"></div>
        </div>
    </main>

    <div id="spotify-player-dock" style="position: fixed; bottom: -100px; right: 20px; width: 360px; height: 90px; z-index: 1000; transition: bottom 0.4s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-radius: 12px; overflow: hidden;"></div>

    <script src="../navbar.js"></script> <script src="music-loader.js"></script> </body>
</html>
